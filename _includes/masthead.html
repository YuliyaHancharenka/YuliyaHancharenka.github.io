{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg">
            <a href="{{ base_path }}/">
              <span class="lang-ru">Юлия Гончаренко</span>
              <span class="lang-en" style="display:none">Yuliya Hancharenka</span>
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item">
              <a href="{{ domain }}{{ link.url }}">
                <span class="lang-ru">{{ link.title }}</span>
                <span class="lang-en" style="display:none">{{ link.title_en }}</span>
              </a>
            </li>
          {% endfor %}
          <li class="masthead__menu-item">
            <button id="lang-toggle" class="lang-toggle-btn" aria-label="Switch language">EN</button>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
