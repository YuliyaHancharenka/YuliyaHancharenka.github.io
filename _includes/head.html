{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">

<style>
  /* Teal masthead override */
  .masthead {
    background-color: #2D7A7A;
    border-bottom: none;
  }
  .masthead a,
  .masthead__menu-item a {
    color: #ffffff !important;
  }
  .masthead__menu-item--lg a {
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .greedy-nav button {
    background: transparent;
  }
  .greedy-nav .navicon,
  .greedy-nav .navicon::before,
  .greedy-nav .navicon::after {
    background: #ffffff;
  }

  /* Language toggle button */
  .lang-toggle-btn {
    background: rgba(255,255,255,0.15);
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 4px;
    padding: 2px 10px;
    font-size: 0.75em;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s;
    vertical-align: middle;
  }
  .lang-toggle-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  /* Hero section on home/about page */
  .page__hero {
    background: linear-gradient(135deg, #1A4A4A 0%, #2D7A7A 100%);
    color: #ffffff;
    padding: 3em 2em;
    margin-bottom: 2em;
    border-radius: 0 0 8px 8px;
  }
  .page__hero h1 {
    color: #ffffff;
    font-size: 2em;
    margin-bottom: 0.25em;
  }
  .page__hero .tagline {
    color: rgba(255,255,255,0.85);
    font-size: 1.15em;
    font-weight: 300;
  }

  /* About section cards */
  .about-section {
    margin: 2em 0;
  }
  .about-section h2 {
    color: #2D7A7A;
    border-bottom: 2px solid #88C0C0;
    padding-bottom: 0.3em;
    margin-bottom: 0.8em;
  }
  .identity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5em;
    margin: 1.5em 0;
  }
  @media (max-width: 600px) {
    .identity-grid { grid-template-columns: 1fr; }
  }
  .identity-card {
    background: #f4fafa;
    border-left: 4px solid #2D7A7A;
    padding: 1.2em 1.4em;
    border-radius: 0 6px 6px 0;
  }
  .identity-card h3 {
    color: #2D7A7A;
    margin-top: 0;
    margin-bottom: 0.4em;
  }
  .identity-card p {
    margin: 0;
    font-size: 0.95em;
    line-height: 1.6;
    color: #333;
  }

  /* Author sidebar bio link colors */
  .author__bio {
    font-size: 0.9em;
    line-height: 1.5;
  }
  .author__urls a {
    color: #2D7A7A;
  }

  /* CTA button */
  .btn-coaching {
    display: inline-block;
    background: #2D7A7A;
    color: #ffffff !important;
    padding: 0.7em 1.8em;
    border-radius: 4px;
    font-weight: 600;
    text-decoration: none !important;
    margin-top: 1em;
    transition: background 0.2s;
  }
  .btn-coaching:hover {
    background: #1A4A4A;
  }

  /* Certificate gallery placeholders */
  .cert-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1em;
    margin: 1.5em 0;
  }
  .cert-placeholder {
    background: #f4fafa;
    border: 2px dashed #88C0C0;
    border-radius: 6px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #88C0C0;
    font-size: 0.85em;
    text-align: center;
    padding: 1em;
  }
</style>

<script src="{{ base_path }}/assets/js/language-toggle.js" defer></script>
