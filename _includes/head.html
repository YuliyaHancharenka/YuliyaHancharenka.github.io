{% include base_path %}

<meta charset="utf-8">
{% include seo.html %}
<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
<meta http-equiv="cleartype" content="on">

<style>
  /* ============================================================
     PASTEL PALETTE
     --mint:    #7DC8C4  (primary teal-mint)
     --mint-lt: #B8E8E5  (light mint)
     --mint-pl: #E6F7F6  (pale mint)
     --peach:   #FFB8A8  (warm peach)
     --lav:     #C8B8E8  (lavender)
     --cream:   #FFF9F5  (body bg)
  ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  /* --- Animations --- */
  @keyframes floatUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 4px 14px rgba(125,200,196,0.35); }
    50%       { box-shadow: 0 4px 24px rgba(125,200,196,0.65); }
  }
  @keyframes dot-drift {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-8px) scale(1.08); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* --- Base --- */
  body {
    background-color: #FFF9F5;
    font-family: 'Nunito', -apple-system, sans-serif;
  }

  /* --- Masthead --- */
  .masthead {
    background: linear-gradient(120deg, #6ABFBB 0%, #8DD0CC 50%, #A8DCDA 100%);
    border-bottom: none;
    box-shadow: 0 3px 16px rgba(106,191,187,0.25);
  }
  .greedy-nav { background: transparent !important; }
  .masthead a,
  .masthead__menu-item a { color: #ffffff !important; font-weight: 600; }
  .masthead__menu-item--lg a { font-weight: 800; font-size: 1.05em; letter-spacing: 0.01em; }
  .masthead__menu-item a:hover { opacity: 0.82; }
  .greedy-nav button { background: transparent !important; }
  .greedy-nav .navicon,
  .greedy-nav .navicon::before,
  .greedy-nav .navicon::after { background: #ffffff; }
  .greedy-nav .hidden-links {
    background: #5AAFAB !important;
    border: none !important;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }
  .greedy-nav .hidden-links a { color: #ffffff !important; }

  /* --- Lang toggle --- */
  .masthead__menu {
    display: flex;
    align-items: center;
  }
  .lang-toggle-btn {
    flex-shrink: 0;
    margin-left: auto;
    background: rgba(255,255,255,0.22);
    color: #ffffff;
    border: 2px solid rgba(255,255,255,0.65);
    border-radius: 20px;
    padding: 3px 13px;
    font-size: 0.7em;
    font-weight: 800;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    line-height: 1.9;
    white-space: nowrap;
  }
  .lang-toggle-btn:hover {
    background: rgba(255,255,255,0.38);
    transform: scale(1.05);
  }

  /* --- Hero --- */
  .page__hero {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #4FA9A5 0%, #7DC8C4 45%, #9ED8D5 100%);
    color: #ffffff;
    padding: 2.8em 2em 2.2em;
    margin-bottom: 2em;
    border-radius: 0 0 18px 18px;
    animation: floatUp 0.5s ease both;
  }
  /* Decorative blobs */
  .page__hero::before {
    content: '';
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    top: -50px; right: -40px;
    pointer-events: none;
  }
  .page__hero::after {
    content: '';
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    bottom: -30px; left: 60px;
    pointer-events: none;
  }
  .hero-dots {
    position: absolute;
    top: 14px; right: 80px;
    width: 60px; height: 60px;
    background-image: radial-gradient(circle, rgba(255,255,255,0.25) 2px, transparent 2px);
    background-size: 12px 12px;
    animation: dot-drift 4s ease-in-out infinite;
    pointer-events: none;
  }
  .page__hero h1 {
    color: #ffffff;
    font-size: 2em;
    font-weight: 800;
    margin: 0 0 0.15em;
    line-height: 1.15;
    position: relative;
  }
  .page__hero .tagline {
    color: rgba(255,255,255,0.92);
    font-size: 1.05em;
    font-weight: 400;
    margin: 0;
    position: relative;
  }

  /* --- Section headings --- */
  .about-section { margin: 1.8em 0; animation: floatUp 0.45s ease both; }
  .about-section h2 {
    color: #4A9A96;
    border-bottom: 2.5px solid #B8E8E5;
    padding-bottom: 0.3em;
    margin-bottom: 0.9em;
    font-size: 1.15em;
    font-weight: 800;
  }
  .about-section p, .about-section li { color: #2D3D3D; line-height: 1.75; }

  /* --- Coach card (wide) --- */
  .coach-card {
    display: flex;
    align-items: flex-start;
    gap: 1.1em;
    background: linear-gradient(135deg, #E6F7F6 0%, #EEF9F8 100%);
    border-radius: 14px;
    padding: 1.4em 1.6em;
    margin: 1em 0 0.6em;
    border: 1.5px solid #B8E8E5;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .coach-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(125,200,196,0.22);
  }
  .coach-card__icon {
    font-size: 2em;
    flex-shrink: 0;
    margin-top: 0.1em;
  }
  .coach-card__body h3 {
    color: #4A9A96;
    font-size: 1.05em;
    font-weight: 800;
    margin: 0 0 0.35em;
  }
  .coach-card__body p {
    margin: 0;
    font-size: 0.93em;
    line-height: 1.65;
    color: #3A4A4A;
  }

  /* --- IT note --- */
  .it-note {
    font-size: 0.85em;
    color: #7A9090;
    margin: 0.4em 0 0;
    padding-left: 0.3em;
  }
  .it-note a { color: #5AAFAB; font-weight: 600; }
  .it-note a:hover { text-decoration: underline; }

  /* --- Story section --- */
  .story-section {
    background: linear-gradient(135deg, #FFF4F0 0%, #FFF9F5 100%);
    border-left: 4px solid #FFB8A8;
    border-radius: 0 12px 12px 0;
    padding: 1.4em 1.6em;
    margin-left: -0.5em;
  }
  .story-section h2 { color: #D4806A; border-bottom-color: #FFCCBE; }
  .story-section p { color: #3A3030; }

  /* --- Tag pills --- */
  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55em;
    margin-top: 1.1em;
  }
  .tag {
    display: inline-block;
    background: #E6F7F6;
    border: 1.5px solid #B8E8E5;
    color: #3A7A76;
    border-radius: 20px;
    padding: 0.3em 0.9em;
    font-size: 0.82em;
    font-weight: 600;
    transition: background 0.2s, transform 0.15s;
    cursor: default;
  }
  .tag:hover {
    background: #C8EFEC;
    transform: scale(1.04);
  }

  /* --- Identity grid (for other pages) --- */
  .identity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.1em;
    margin: 1.1em 0;
  }
  @media (max-width: 680px) {
    .identity-grid { grid-template-columns: 1fr; gap: 0.8em; }
  }
  .identity-card {
    background: #E6F7F6;
    border-left: 4px solid #7DC8C4;
    padding: 1.1em 1.3em;
    border-radius: 0 10px 10px 0;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .identity-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(125,200,196,0.2);
  }
  .identity-card h3 { color: #4A9A96; margin: 0 0 0.35em; font-size: 0.98em; font-weight: 700; }
  .identity-card p { margin: 0; font-size: 0.91em; line-height: 1.65; color: #3A4A4A; }
  .identity-card a { color: #4A9A96; font-weight: 600; }
  .identity-card a:hover { text-decoration: underline; }

  /* --- Sidebar --- */
  .author__name { color: #2D3D3D; font-weight: 800; }
  .author__bio { font-size: 0.87em; line-height: 1.55; color: #4A6060; }
  .author__urls a { color: #4A9A96 !important; }
  .author__urls a:hover { color: #2D7A76 !important; }

  /* --- CTA button --- */
  .btn-coaching {
    display: inline-block;
    background: linear-gradient(135deg, #5AAFAB 0%, #7DC8C4 100%);
    color: #ffffff !important;
    padding: 0.8em 2.2em;
    border-radius: 30px;
    font-weight: 700;
    font-size: 0.95em;
    text-decoration: none !important;
    margin-top: 1.4em;
    letter-spacing: 0.02em;
    animation: pulse-glow 2.8s ease-in-out infinite;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-coaching:hover {
    transform: translateY(-2px) scale(1.03);
    opacity: 0.92;
  }

  /* --- Telegram block --- */
  .telegram-block {
    background: linear-gradient(135deg, #E6F7F6 0%, #D8F0EE 100%);
    border: 2px solid #B8E8E5;
    border-radius: 14px;
    padding: 1.6em 1.8em;
    margin: 1.4em 0;
    text-align: center;
  }
  .telegram-block .tg-icon { font-size: 2.2em; margin-bottom: 0.1em; }
  .telegram-block h3 { color: #4A9A96; margin: 0.15em 0 0.4em; font-size: 1.05em; font-weight: 700; }
  .telegram-block p { margin: 0 0 0.9em; color: #3A5050; font-size: 0.92em; }
  .btn-telegram {
    display: inline-block;
    background: linear-gradient(135deg, #29A6E0 0%, #50BCE8 100%);
    color: #ffffff !important;
    padding: 0.65em 2em;
    border-radius: 25px;
    font-weight: 700;
    font-size: 0.9em;
    text-decoration: none !important;
    transition: transform 0.2s, opacity 0.2s;
    box-shadow: 0 3px 10px rgba(41,166,224,0.3);
  }
  .btn-telegram:hover { transform: translateY(-2px); opacity: 0.9; }

  /* --- Certificate grid --- */
  .cert-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 1em;
    margin: 1.2em 0;
  }
  .cert-placeholder {
    background: #E6F7F6;
    border: 2px dashed #B8E8E5;
    border-radius: 10px;
    height: 148px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8AC8C5;
    font-size: 0.82em;
    text-align: center;
    padding: 1em;
    line-height: 1.45;
    transition: background 0.2s;
  }
  .cert-placeholder:hover { background: #D8F0EE; }

  /* --- Mobile --- */
  @media (max-width: 480px) {
    .page__hero { padding: 1.8em 1.2em 1.6em; border-radius: 0 0 12px 12px; }
    .page__hero h1 { font-size: 1.55em; }
    .page__hero .tagline { font-size: 0.92em; }
    .coach-card { flex-direction: column; gap: 0.6em; padding: 1.1em 1.2em; }
    .btn-coaching { display: block; text-align: center; }
    .btn-telegram { display: block; }
    .tags-row { gap: 0.4em; }
    .tag { font-size: 0.78em; }
    .story-section { margin-left: 0; border-left-width: 3px; }
    .masthead__inner-wrap { padding: 0.7em 0.9em; }
  }
</style>

<script src="{{ base_path }}/assets/js/language-toggle.js" defer></script>
